<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiniela Mundial — Familia</title>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-database-compat.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap');

  :root{
    --grass: #1e5631;
    --grass-dark: #123d21;
    --chalk: #f7f5ef;
    --gold: #d4a537;
    --gold-light: #f0d488;
    --line: #2c6b3f;
    --miss: #c0483a;
    --ink: #16241a;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background: var(--grass-dark);
    background-image:
      repeating-linear-gradient(90deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 1px, transparent 1px, transparent 40px),
      linear-gradient(180deg, var(--grass) 0%, var(--grass-dark) 100%);
    font-family:'Inter', sans-serif;
    color: var(--chalk);
    min-height:100vh;
    padding: 20px 14px 60px;
  }
  .wrap{max-width:900px; margin:0 auto;}
  header{
    text-align:center;
    margin-bottom:22px;
    padding-bottom:18px;
    border-bottom: 2px dashed rgba(247,245,239,0.25);
  }
  h1{
    font-family:'Bebas Neue', sans-serif;
    font-size: clamp(2.2rem, 8vw, 3.4rem);
    letter-spacing: 2px;
    margin: 0;
    color: var(--gold-light);
    text-shadow: 0 2px 0 rgba(0,0,0,0.3);
  }
  .sub{
    font-size:0.85rem;
    color: rgba(247,245,239,0.7);
    margin-top:6px;
    letter-spacing:0.5px;
  }

  /* Scoreboard */
  .board{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(90px,1fr));
    gap:8px;
    margin-bottom:24px;
  }
  .board-cell{
    background: rgba(0,0,0,0.22);
    border:1px solid rgba(212,165,55,0.3);
    border-radius:10px;
    padding:12px 6px;
    text-align:center;
  }
  .board-cell .name{
    font-size:0.72rem;
    text-transform:uppercase;
    letter-spacing:1px;
    color: var(--gold-light);
    font-weight:600;
  }
  .board-cell .pts{
    font-family:'Bebas Neue', sans-serif;
    font-size:2rem;
    line-height:1.1;
    margin-top:2px;
  }
  .board-cell.leader{
    background: rgba(212,165,55,0.18);
    border-color: var(--gold);
  }
  .board-cell.leader .pts{color:var(--gold-light);}

  .whoami{
    display:flex;
    align-items:center;
    gap:10px;
    justify-content:center;
    margin-bottom:18px;
    background: rgba(0,0,0,0.2);
    border:1px solid rgba(212,165,55,0.35);
    border-radius:10px;
    padding:10px 14px;
  }
  .whoami label{
    font-size:0.8rem;
    text-transform:uppercase;
    letter-spacing:1px;
    color: var(--gold-light);
    font-weight:600;
  }
  .whoami select{
    background: rgba(247,245,239,0.1);
    border:1px solid var(--gold);
    color: var(--chalk);
    border-radius:8px;
    padding:8px 10px;
    font-size:0.9rem;
    font-weight:600;
  }
  .pick.mine{
    box-shadow: 0 0 0 2px var(--gold);
  }
  .pick.mine .pname{color: var(--gold-light);}

  .deadline-box{
    background: rgba(192,72,58,0.12);
    border:1px solid rgba(192,72,58,0.4);
    border-radius:10px;
    padding:10px 14px;
    margin-bottom:18px;
  }
  .deadline-row{
    display:flex;
    align-items:center;
    gap:10px;
    justify-content:center;
    flex-wrap:wrap;
  }
  .deadline-row label{
    font-size:0.8rem;
    text-transform:uppercase;
    letter-spacing:1px;
    color: #e08a7a;
    font-weight:600;
  }
  .deadline-row input{
    background: rgba(247,245,239,0.1);
    border:1px solid #c0483a;
    color: var(--chalk);
    border-radius:8px;
    padding:7px 9px;
    font-size:0.85rem;
  }
  .deadline-status{
    text-align:center;
    font-size:0.78rem;
    margin-top:8px;
    color: rgba(247,245,239,0.7);
    font-weight:600;
  }
  .deadline-status.locked{color:#8fd19e;}
  .hidden-pick{
    display:flex;
    align-items:center;
    justify-content:center;
    height:34px;
    background: rgba(0,0,0,0.25);
    border-radius:6px;
    font-size:0.8rem;
    color: rgba(247,245,239,0.35);
  }

  /* Add match */
  .add-match{
    background: rgba(0,0,0,0.2);
    border:1px solid rgba(247,245,239,0.15);
    border-radius:12px;
    padding:14px;
    margin-bottom:20px;
    display:flex;
    gap:8px;
    flex-wrap:wrap;
  }
  .add-match input{
    flex:1;
    min-width:110px;
    background: rgba(247,245,239,0.08);
    border:1px solid rgba(247,245,239,0.25);
    border-radius:8px;
    padding:9px 10px;
    color: var(--chalk);
    font-size:0.9rem;
  }
  .add-match input::placeholder{color: rgba(247,245,239,0.4);}
  .add-match button{
    background: var(--gold);
    color: var(--ink);
    border:none;
    border-radius:8px;
    padding:9px 16px;
    font-weight:700;
    cursor:pointer;
    font-size:0.9rem;
  }
  .add-match button:active{transform: scale(0.97);}

  /* Match cards */
  .match{
    background: rgba(0,0,0,0.22);
    border:1px solid rgba(247,245,239,0.15);
    border-radius:14px;
    margin-bottom:14px;
    overflow:hidden;
  }
  .match-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:12px 14px;
    background: rgba(0,0,0,0.18);
  }
  .teams{
    font-family:'Bebas Neue', sans-serif;
    font-size:1.3rem;
    letter-spacing:1px;
    color: var(--chalk);
  }
  .teams .vs{color: var(--gold); font-size:0.9rem; margin:0 6px;}
  .del-btn{
    background:none;
    border:1px solid rgba(247,245,239,0.3);
    color: rgba(247,245,239,0.6);
    border-radius:6px;
    padding:4px 9px;
    font-size:0.75rem;
    cursor:pointer;
  }
  .result-row{
    padding:10px 14px;
    display:flex;
    align-items:center;
    gap:10px;
    background: rgba(212,165,55,0.08);
    border-bottom:1px dashed rgba(247,245,239,0.15);
    flex-wrap:wrap;
  }
  .result-row label{
    font-size:0.75rem;
    text-transform:uppercase;
    letter-spacing:1px;
    color: var(--gold-light);
    font-weight:600;
  }
  .result-row select{
    background: rgba(247,245,239,0.1);
    border:1px solid var(--gold);
    color: var(--chalk);
    border-radius:6px;
    padding:6px 8px;
    font-size:0.85rem;
  }
  .picks-grid{
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(130px,1fr));
    gap:8px;
    padding:12px 14px;
  }
  .pick{
    background: rgba(247,245,239,0.05);
    border-radius:8px;
    padding:8px;
  }
  .pick .pname{
    font-size:0.7rem;
    color: rgba(247,245,239,0.6);
    text-transform:uppercase;
    letter-spacing:0.5px;
    margin-bottom:4px;
  }
  .pick select{
    width:100%;
    background: rgba(247,245,239,0.08);
    border:1px solid rgba(247,245,239,0.25);
    color: var(--chalk);
    border-radius:6px;
    padding:6px;
    font-size:0.82rem;
  }
  .pick.correct{
    background: rgba(30,120,60,0.35);
    box-shadow: inset 0 0 0 1.5px #4caf6e;
  }
  .pick.wrong{
    background: rgba(192,72,58,0.22);
    box-shadow: inset 0 0 0 1.5px var(--miss);
  }
  .pick.correct select, .pick.wrong select{border-color: transparent;}

  .empty{
    text-align:center;
    padding:40px 14px;
    color: rgba(247,245,239,0.5);
    font-size:0.9rem;
  }

  .save-note{
    text-align:center;
    font-size:0.72rem;
    color: rgba(247,245,239,0.4);
    margin-top:18px;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>⚽ Quiniela Familiar</h1>
    <div class="sub">Ney · Emma · Mario · Ale · Luis · Den</div>
  </header>

  <div id="loading" style="text-align:center; padding:60px 14px; color:rgba(247,245,239,0.6);">
    Cargando quiniela…
  </div>

  <div id="app" style="display:none;">
    <div class="whoami">
      <label>¿Quién eres?</label>
      <select id="userSelect" onchange="setCurrentUser(this.value)">
        <option value="">— Elige tu nombre —</option>
      </select>
    </div>
    <div style="text-align:center; margin-bottom:14px;">
      <a href="#" onclick="resetPersonPin(); return false;" style="font-size:0.72rem; color:rgba(247,245,239,0.45); text-decoration:underline;">¿Se te olvidó tu PIN? Pídele a Den que lo resetee</a>
    </div>

    <div class="deadline-box" id="deadlineBox">
      <div class="deadline-row">
        <label>🔒 Cierre de captura:</label>
        <input type="datetime-local" id="deadlineInput" onchange="setDeadline(this.value)">
      </div>
      <div class="deadline-status" id="deadlineStatus"></div>
    </div>

    <div style="text-align:center; margin-bottom:18px;">
      <button onclick="toggleAdminMode()" id="adminBtn" style="background:#8a3a3a; color:#fff; border:none; border-radius:8px; padding:8px 14px; font-weight:700; cursor:pointer; font-size:0.78rem;">
        🔑 Modo administrador: desactivado
      </button>
    </div>

    <div style="text-align:center; margin-bottom:18px; display:flex; gap:8px; justify-content:center; flex-wrap:wrap;">
      <button onclick="applyOfficialResults()" style="background:#2c8f52; color:#fff; border:none; border-radius:8px; padding:10px 18px; font-weight:700; cursor:pointer; font-size:0.85rem;">
        ⚡ Cargar resultados oficiales ya jugados
      </button>
      <button onclick="loadNextRound()" style="background:#d4a537; color:#16241a; border:none; border-radius:8px; padding:10px 18px; font-weight:700; cursor:pointer; font-size:0.85rem;">
        🏆 Cargar octavos de final
      </button>
    </div>

    <div style="text-align:center; font-size:0.72rem; color:rgba(247,245,239,0.5); margin-bottom:10px;">
      ⚡ 3 pts marcador exacto · 1 pt solo acertar quién gana
    </div>
    <div class="board" id="board"></div>

    <div class="add-match">
      <input type="text" id="teamA" placeholder="Equipo A">
      <input type="text" id="teamB" placeholder="Equipo B">
      <button onclick="addMatch()">+ Agregar partido</button>
    </div>

    <div id="matches"></div>

    <div class="save-note" id="sync-status">✓ Sincronizado</div>
    <div class="save-note">Comparte este link con la familia — todos ven y capturan aquí mismo</div>
  </div>
</div>

<script>
const PEOPLE = ["Ney","Emma","Mario","Ale","Luis","Den"];

function emptyPicks(){
  const p = {};
  PEOPLE.forEach(x => p[x] = "");
  return p;
}

function emptyScorePicks(){
  const p = {};
  PEOPLE.forEach(x => p[x] = {a:"", b:""});
  return p;
}

function seedOctavos(){
  const raw = [
    ["Canadá","Marruecos"],
    ["Paraguay","Francia"],
    ["Brasil","Noruega"],
    ["México","Inglaterra"],
    ["Portugal","España"],
    ["EE.UU.","Bélgica"],
    ["Suiza","Por confirmar (Colombia/Ghana)"],
    ["Por confirmar (Argentina/Cabo Verde)","Por confirmar (Australia/Egipto)"]
  ];
  return raw.map((m,i) => ({ id: Date.now()+1000+i, teamA:m[0], teamB:m[1], result:"", golA:"", golB:"", picks: emptyScorePicks(), round:"Octavos", mode:"score" }));
}

async function loadNextRound(){
  const already = matches.some(m => m.round === "Octavos");
  if(already){
    alert("Los octavos de final ya están cargados. Si necesitas corregir un cruce 'Por confirmar', toca el nombre del equipo para editarlo.");
    return;
  }
  const nuevos = seedOctavos();
  matches = matches.concat(nuevos);
  await saveData();
}

function renameTeam(id, which){
  const m = matches.find(m => m.id === id);
  if(!m) return;
  const current = which === "A" ? m.teamA : m.teamB;
  const nuevo = prompt("Nombre del equipo:", current);
  if(!nuevo || nuevo.trim() === "" || nuevo === current) return;
  const nuevoLimpio = nuevo.trim();
  if(which === "A") m.teamA = nuevoLimpio; else m.teamB = nuevoLimpio;
  // Limpia picks/resultado que apuntaban al nombre viejo (placeholder), ya no aplican
  if(m.result === current) m.result = "";
  PEOPLE.forEach(p => { if(m.picks[p] === current) m.picks[p] = ""; });
  saveData();
}

function seedMatches(){
  const raw = [
    ["Sudáfrica","Canadá"],
    ["Brasil","Japón"],
    ["Alemania","Paraguay"],
    ["Costa de Marfil","Noruega"],
    ["Francia","Suecia"],
    ["Países Bajos","Marruecos"],
    ["México","Ecuador"],
    ["Inglaterra","R.D. Congo"],
    ["Bélgica","Senegal"],
    ["EE.UU.","Bosnia"],
    ["Portugal","Croacia"],
    ["España","Austria"],
    ["Suiza","Argelia"],
    ["Australia","Egipto"],
    ["Argentina","Cabo Verde"],
    ["Colombia","Ghana"]
  ];
  return raw.map((m,i) => ({ id: Date.now()+i, teamA:m[0], teamB:m[1], result:"", picks: emptyPicks(), round:"Dieciseisavos", mode:"winner" }));
}

let matches = [];
let currentUser = "";
const STORAGE_KEY = "quiniela-octavos";

function applyEmmaPicks(){
  const emma = {
    "Sudáfrica|Canadá":"Sudáfrica",
    "Brasil|Japón":"Brasil",
    "Alemania|Paraguay":"Alemania",
    "Costa de Marfil|Noruega":"Noruega",
    "Francia|Suecia":"Francia",
    "Países Bajos|Marruecos":"Marruecos",
    "México|Ecuador":"México",
    "Inglaterra|R.D. Congo":"R.D. Congo",
    "Bélgica|Senegal":"Bélgica",
    "EE.UU.|Bosnia":"EE.UU.",
    "Portugal|Croacia":"Portugal",
    "España|Austria":"España",
    "Suiza|Argelia":"Argelia",
    "Australia|Egipto":"Australia",
    "Argentina|Cabo Verde":"Argentina",
    "Colombia|Ghana":"Colombia"
  };
  matches.forEach(m => {
    const key = m.teamA + "|" + m.teamB;
    if(emma[key]) m.picks["Emma"] = emma[key];
  });
}

async function applyNeyPicks(){
  const ney = {
    "Alemania|Paraguay":"Alemania",
    "Costa de Marfil|Noruega":"Noruega",
    "Francia|Suecia":"Francia",
    "Países Bajos|Marruecos":"Países Bajos",
    "México|Ecuador":"México",
    "Inglaterra|R.D. Congo":"R.D. Congo",
    "Bélgica|Senegal":"Bélgica",
    "EE.UU.|Bosnia":"EE.UU.",
    "Portugal|Croacia":"Portugal",
    "España|Austria":"España",
    "Suiza|Argelia":"Suiza",
    "Australia|Egipto":"Egipto",
    "Argentina|Cabo Verde":"Cabo Verde",
    "Colombia|Ghana":"Colombia"
  };
  matches.forEach(m => {
    const key = m.teamA + "|" + m.teamB;
    if(ney[key]) m.picks["Ney"] = ney[key];
  });
}

function applyLuisPicks(){
  const luis = {
    "Sudáfrica|Canadá":"Sudáfrica",
    "Brasil|Japón":"Brasil",
    "Costa de Marfil|Noruega":"Costa de Marfil",
    "Alemania|Paraguay":"Alemania",
    "Francia|Suecia":"Francia",
    "Inglaterra|R.D. Congo":"Inglaterra",
    "Bélgica|Senegal":"Bélgica",
    "España|Austria":"España",
    "Australia|Egipto":"Egipto",
    "Portugal|Croacia":"Portugal",
    "Argentina|Cabo Verde":"Argentina",
    "Países Bajos|Marruecos":"Países Bajos",
    "México|Ecuador":"México",
    "EE.UU.|Bosnia":"EE.UU.",
    "Suiza|Argelia":"Suiza",
    "Colombia|Ghana":"Colombia"
  };
  matches.forEach(m => {
    const key = m.teamA + "|" + m.teamB;
    if(luis[key]) m.picks["Luis"] = luis[key];
  });
}

const firebaseConfig = {
  apiKey: "AIzaSyBjBH74yFoHwqHxzwlY9AUgwQsECHRaOGo",
  authDomain: "quiniela-mundial-7427c.firebaseapp.com",
  databaseURL: "https://quiniela-mundial-7427c-default-rtdb.firebaseio.com",
  projectId: "quiniela-mundial-7427c",
  storageBucket: "quiniela-mundial-7427c.firebasestorage.app",
  messagingSenderId: "914483797655",
  appId: "1:914483797655:web:95356f94801324749ed3d2"
};
firebase.initializeApp(firebaseConfig);
const dataRef = firebase.database().ref(STORAGE_KEY);

let deadline = "";
let pins = {};
let isFirstLoad = true;
let saveInFlight = false;

function seedInitialData(){
  matches = seedMatches();
  applyEmmaPicks();
  applyNeyPicks();
  applyLuisPicks();
  deadline = "";
  pins = {};
}

async function loadData(){
  return new Promise((resolve) => {
    dataRef.once('value', (snapshot) => {
      const val = snapshot.val();
      if(val && val.matches){
        matches = val.matches;
        deadline = val.deadline || "";
        pins = val.pins || {};
      } else {
        seedInitialData();
        dataRef.set({matches, deadline, pins}).catch(()=>{});
      }
      resolve();
    }, (err) => {
      // Sin conexión o error de permisos: usa datos locales de respaldo
      seedInitialData();
      resolve();
    });
  });
}

async function saveData(){
  render();
  const el = document.getElementById('sync-status');
  if(el){ el.textContent = "Guardando…"; el.style.color = "rgba(247,245,239,0.4)"; }
  try{
    await dataRef.set({matches, deadline, pins});
    showSyncOk();
  }catch(e){
    showSyncError();
  }
}

// Escucha cambios en vivo de otros familiares
dataRef.on('value', (snapshot) => {
  if(isFirstLoad){ return; } // el primer valor ya se maneja en loadData()
  const val = snapshot.val();
  if(val && val.matches){
    matches = val.matches;
    deadline = val.deadline || "";
    pins = val.pins || {};
    render();
  }
});

function isLocked(){
  if(!deadline) return false;
  return new Date() >= new Date(deadline);
}

function applyOfficialResults(){
  // Resultados oficiales confirmados de dieciseisavos, Mundial 2026 (al 3 de julio)
  const official = {
    "Sudáfrica|Canadá": "Canadá",
    "Brasil|Japón": "Brasil",
    "Alemania|Paraguay": "Paraguay",
    "Costa de Marfil|Noruega": "Noruega",
    "Francia|Suecia": "Francia",
    "Países Bajos|Marruecos": "Marruecos",
    "México|Ecuador": "México",
    "Inglaterra|R.D. Congo": "Inglaterra",
    "Bélgica|Senegal": "Bélgica",
    "EE.UU.|Bosnia": "EE.UU.",
    "Portugal|Croacia": "Portugal",
    "España|Austria": "España",
    "Suiza|Argelia": "Suiza"
    // Australia-Egipto, Argentina-Cabo Verde y Colombia-Ghana se juegan hoy 3 de julio,
    // se agregan en cuanto terminen
  };
  let changed = false;
  matches.forEach(m => {
    const key = m.teamA + "|" + m.teamB;
    if(official[key] && m.result !== official[key]){
      m.result = official[key];
      changed = true;
    }
  });
  if(changed) saveData(); else render();
}

function setDeadline(val){
  deadline = val;
  saveData();
}

function showSyncError(){
  const el = document.getElementById('sync-status');
  if(el){
    el.textContent = "⚠ No se pudo sincronizar, revisa tu conexión";
    el.style.color = "#e08a7a";
  }
}
function showSyncOk(){
  const el = document.getElementById('sync-status');
  if(el){
    el.textContent = "✓ Sincronizado";
    el.style.color = "rgba(247,245,239,0.4)";
  }
}

function addMatch(){
  const a = document.getElementById('teamA').value.trim();
  const b = document.getElementById('teamB').value.trim();
  if(!a || !b) return;
  const picks = {};
  PEOPLE.forEach(p => picks[p] = {a:"", b:""});
  matches.push({ id: Date.now(), teamA:a, teamB:b, result:"", golA:"", golB:"", picks, mode:"score" });
  document.getElementById('teamA').value = "";
  document.getElementById('teamB').value = "";
  saveData();
}

function removeMatch(id){
  matches = matches.filter(m => m.id !== id);
  saveData();
}

function setResult(id, val){
  const m = matches.find(m => m.id === id);
  m.result = val;
  saveData();
}

function setPick(id, person, val){
  const m = matches.find(m => m.id === id);
  m.picks[person] = val;
  saveData();
}

// --- Modo marcador (goles) ---

function setScoreResult(id, field, val){
  const m = matches.find(m => m.id === id);
  const num = val === "" ? "" : Math.max(0, parseInt(val) || 0);
  if(field === "A") m.golA = num; else m.golB = num;
  // Si los goles no empatan, el ganador se calcula solo
  if(m.golA !== "" && m.golB !== ""){
    if(m.golA > m.golB) m.result = m.teamA;
    else if(m.golB > m.golA) m.result = m.teamB;
    // si empatan, se deja m.result como esté (se define aparte, por penales)
  }
  saveData();
}

function setResultTieWinner(id, val){
  const m = matches.find(m => m.id === id);
  m.result = val;
  saveData();
}

function setScorePick(id, person, field, val){
  const m = matches.find(m => m.id === id);
  if(!m.picks[person] || typeof m.picks[person] !== "object") m.picks[person] = {a:"", b:""};
  const num = val === "" ? "" : Math.max(0, parseInt(val) || 0);
  if(field === "a") m.picks[person].a = num; else m.picks[person].b = num;
  saveData();
}

function computeScores(){
  const scores = {};
  PEOPLE.forEach(p => scores[p] = 0);
  matches.forEach(m => {
    if(!m.result) return;
    const isScoreMode = m.mode === "score";

    PEOPLE.forEach(p => {
      const pick = m.picks[p];
      if(!pick) return;

      if(!isScoreMode){
        // Modo simple: solo ganador, 1 punto
        if(pick === m.result) scores[p]++;
        return;
      }

      // Modo marcador: necesita el resultado real con goles capturados
      if(m.golA === "" || m.golB === "" || m.golA === undefined || m.golB === undefined) return;
      if(!pick || typeof pick !== "object" || pick.a === "" || pick.b === "" || pick.a === undefined || pick.b === undefined) return;

      if(pick.a === m.golA && pick.b === m.golB){
        scores[p] += 3; // marcador exacto
      } else {
        const predictedWinner = pick.a > pick.b ? m.teamA : (pick.b > pick.a ? m.teamB : "empate");
        const actualWinner = m.golA > m.golB ? m.teamA : (m.golB > m.golA ? m.teamB : m.result);
        if(predictedWinner === actualWinner) scores[p] += 1; // solo le atinó a quién gana
      }
    });
  });
  return scores;
}

const ADMIN_PIN = "2026";
let adminUnlocked = false;

function toggleAdminMode(){
  if(adminUnlocked){
    adminUnlocked = false;
    render();
    return;
  }
  const pin = prompt("PIN maestro para poder editar resultados después del cierre:");
  if(pin === ADMIN_PIN){
    adminUnlocked = true;
    alert("Modo administrador activado. Ya puedes capturar/corregir resultados.");
    render();
  } else if(pin !== null){
    alert("PIN maestro incorrecto.");
  }
}

function resetPersonPin(){
  const master = prompt("PIN maestro (solo tú lo conoces):");
  if(master !== ADMIN_PIN){
    if(master !== null) alert("PIN maestro incorrecto.");
    return;
  }
  const nombre = prompt(`¿A quién le reseteo el PIN?\n(${PEOPLE.join(", ")})`);
  if(!nombre) return;
  const match = PEOPLE.find(p => p.toLowerCase() === nombre.trim().toLowerCase());
  if(!match){
    alert("Ese nombre no está en la lista.");
    return;
  }
  delete pins[match];
  if(currentUser === match) currentUser = "";
  saveData();
  alert(`Listo, el PIN de ${match} fue reseteado. La próxima vez que elija su nombre podrá crear uno nuevo.`);
}

function setCurrentUser(name){
  if(!name){ currentUser = ""; render(); return; }

  if(!pins[name]){
    // Primera vez que este nombre entra: crea su PIN
    const nuevoPin = prompt(`${name}, crea tu PIN de 4 dígitos para proteger tus picks:`);
    if(!nuevoPin || !/^\d{4}$/.test(nuevoPin)){
      alert("El PIN debe ser de 4 dígitos. Inténtalo de nuevo.");
      populateUserSelect();
      return;
    }
    pins[name] = nuevoPin;
    currentUser = name;
    saveData();
    return;
  }

  // Ya tiene PIN: pídelo
  const intento = prompt(`Ingresa el PIN de ${name}:`);
  if(intento === pins[name]){
    currentUser = name;
    render();
  } else {
    alert("PIN incorrecto.");
    populateUserSelect();
  }
}

function populateUserSelect(){
  const sel = document.getElementById('userSelect');
  if(!sel) return;
  sel.innerHTML = `<option value="">— Elige tu nombre —</option>` +
    PEOPLE.map(p => `<option value="${p}" ${currentUser===p?"selected":""}>${p}</option>`).join('');
}

function render(){
  populateUserSelect();

  // Deadline UI
  const dlInput = document.getElementById('deadlineInput');
  if(dlInput && document.activeElement !== dlInput) dlInput.value = deadline;
  const locked = isLocked();

  const adminBtn = document.getElementById('adminBtn');
  if(adminBtn){
    adminBtn.textContent = adminUnlocked ? "🔑 Modo administrador: ACTIVADO (toca para salir)" : "🔑 Modo administrador: desactivado";
    adminBtn.style.background = adminUnlocked ? "#2c8f52" : "#8a3a3a";
  }

  const canEditResult = !locked || adminUnlocked;
  const statusEl = document.getElementById('deadlineStatus');
  if(statusEl){
    if(!deadline){
      statusEl.textContent = "Sin fecha de cierre — todos capturan a ciegas hasta que la pongas";
      statusEl.className = "deadline-status";
    } else if(locked){
      statusEl.textContent = "🔓 Cerrado — todos los picks ya están a la vista";
      statusEl.className = "deadline-status locked";
    } else {
      const d = new Date(deadline);
      statusEl.textContent = `🔒 Oculto hasta ${d.toLocaleString('es-MX', {day:'numeric', month:'short', hour:'2-digit', minute:'2-digit'})}`;
      statusEl.className = "deadline-status";
    }
  }

  const scores = computeScores();
  const maxScore = Math.max(0, ...Object.values(scores));

  const board = document.getElementById('board');
  board.innerHTML = PEOPLE.map(p => `
    <div class="board-cell ${scores[p] === maxScore && maxScore > 0 ? 'leader' : ''}">
      <div class="name">${p}</div>
      <div class="pts">${scores[p]}</div>
    </div>
  `).join('');

  const container = document.getElementById('matches');
  if(matches.length === 0){
    container.innerHTML = `<div class="empty">Agrega el primer partido de la ronda arriba ⬆</div>`;
    return;
  }

  container.innerHTML = matches.map(m => {
    const isScoreMode = m.mode === "score";

    const resultBlock = isScoreMode ? `
      <div class="result-row">
        <label>Marcador real:</label>
        <span style="font-weight:700;">${m.teamA}</span>
        <input type="number" min="0" style="width:46px; text-align:center;" value="${m.golA}" onchange="setScoreResult(${m.id}, 'A', this.value)" ${canEditResult ? "" : "disabled"}>
        <span>-</span>
        <input type="number" min="0" style="width:46px; text-align:center;" value="${m.golB}" onchange="setScoreResult(${m.id}, 'B', this.value)" ${canEditResult ? "" : "disabled"}>
        <span style="font-weight:700;">${m.teamB}</span>
        ${(m.golA !== "" && m.golB !== "" && m.golA === m.golB) ? `
          <select onchange="setResultTieWinner(${m.id}, this.value)" style="margin-left:8px;" ${canEditResult ? "" : "disabled"}>
            <option value="" ${m.result==""?"selected":""}>¿Quién avanzó? (penales)</option>
            <option value="${m.teamA}" ${m.result===m.teamA?"selected":""}>${m.teamA}</option>
            <option value="${m.teamB}" ${m.result===m.teamB?"selected":""}>${m.teamB}</option>
          </select>
        ` : ""}
        ${locked && !adminUnlocked ? `<div style="font-size:0.7rem; color:rgba(247,245,239,0.4); width:100%; margin-top:4px;">🔒 Solo el administrador puede editar el resultado</div>` : ""}
      </div>
    ` : `
      <div class="result-row">
        <label>Resultado real:</label>
        <select onchange="setResult(${m.id}, this.value)" ${canEditResult ? "" : "disabled"}>
          <option value="" ${m.result==""?"selected":""}>Sin definir</option>
          <option value="${m.teamA}" ${m.result===m.teamA?"selected":""}>Gana ${m.teamA}</option>
          <option value="${m.teamB}" ${m.result===m.teamB?"selected":""}>Gana ${m.teamB}</option>
        </select>
        ${locked && !adminUnlocked ? `<div style="font-size:0.7rem; color:rgba(247,245,239,0.4); width:100%; margin-top:4px;">🔒 Solo el administrador puede editar el resultado</div>` : ""}
      </div>
    `;

    const picksBlock = PEOPLE.map(p => {
      const pick = m.picks[p];
      const mine = p === currentUser ? "mine" : "";
      const isMe = p === currentUser;
      const canEdit = !locked && isMe;

      if(isScoreMode){
        const hasPick = pick && typeof pick === "object" && pick.a !== "" && pick.b !== "";

        if(!locked && !isMe){
          return `
            <div class="pick ${mine}">
              <div class="pname">${p}</div>
              <div class="hidden-pick">${hasPick ? "🔒 Oculto" : "— sin capturar"}</div>
            </div>
          `;
        }

        let cls = "";
        if(hasPick && m.golA !== "" && m.golB !== ""){
          if(pick.a === m.golA && pick.b === m.golB) cls = "correct";
          else {
            const predictedWinner = pick.a > pick.b ? m.teamA : (pick.b > pick.a ? m.teamB : "empate");
            const actualWinner = m.golA > m.golB ? m.teamA : (m.golB > m.golA ? m.teamB : m.result);
            cls = predictedWinner === actualWinner ? "correct" : "wrong";
          }
        }
        const a = (pick && typeof pick === "object") ? pick.a : "";
        const b = (pick && typeof pick === "object") ? pick.b : "";
        return `
          <div class="pick ${cls} ${mine}">
            <div class="pname">${p}${isMe ? " (tú)" : ""}</div>
            <div style="display:flex; align-items:center; gap:4px; justify-content:center;">
              <input type="number" min="0" style="width:38px; text-align:center;" value="${a}" onchange="setScorePick(${m.id}, '${p}', 'a', this.value)" ${canEdit ? "" : "disabled"}>
              <span>-</span>
              <input type="number" min="0" style="width:38px; text-align:center;" value="${b}" onchange="setScorePick(${m.id}, '${p}', 'b', this.value)" ${canEdit ? "" : "disabled"}>
            </div>
          </div>
        `;
      }

      // Modo ganador (legacy, ya usado en dieciseisavos)
      if(!locked && !isMe){
        const hasPick = pick && pick !== "";
        return `
          <div class="pick ${mine}">
            <div class="pname">${p}</div>
            <div class="hidden-pick">${hasPick ? "🔒 Oculto" : "— sin capturar"}</div>
          </div>
        `;
      }
      let cls = "";
      if(m.result && pick){ cls = pick === m.result ? "correct" : "wrong"; }
      return `
        <div class="pick ${cls} ${mine}">
          <div class="pname">${p}${isMe ? " (tú)" : ""}</div>
          <select onchange="setPick(${m.id}, '${p}', this.value)" ${canEdit ? "" : "disabled"}>
            <option value="" ${pick===""?"selected":""}>—</option>
            <option value="${m.teamA}" ${pick===m.teamA?"selected":""}>${m.teamA}</option>
            <option value="${m.teamB}" ${pick===m.teamB?"selected":""}>${m.teamB}</option>
          </select>
        </div>
      `;
    }).join('');

    return `
      <div class="match">
        <div class="match-head">
          <div class="teams">
            <span onclick="renameTeam(${m.id}, 'A')" style="cursor:pointer; border-bottom:1px dotted rgba(247,245,239,0.4);" title="Toca para editar">${m.teamA}</span>
            <span class="vs">vs</span>
            <span onclick="renameTeam(${m.id}, 'B')" style="cursor:pointer; border-bottom:1px dotted rgba(247,245,239,0.4);" title="Toca para editar">${m.teamB}</span>
          </div>
          <button class="del-btn" onclick="removeMatch(${m.id})">Quitar</button>
        </div>
        ${resultBlock}
        <div class="picks-grid">${picksBlock}</div>
      </div>
    `;
  }).join('');
}

async function init(){
  await loadData();
  applyOfficialResults();
  document.getElementById('loading').style.display = "none";
  document.getElementById('app').style.display = "block";
  // A partir de aquí, cualquier cambio de otro familiar llega solo, en vivo
  isFirstLoad = false;
}
init();
</script>
